<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1565c0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BLDC Motor">
    <link rel="manifest" href="manifest1.json">
    <link rel="apple-touch-icon" href="icon-19.png">
    <title>Simulasi BLDC Motor — Akhmad Rosyidan</title>
    <link rel="stylesheet" href="stylenew.css">
</head>
<body>

<h1>Simulasi BLDC Motor — Komutasi Multi-Fasa</h1>

<!-- PWA Install Banner -->
<div id="pwa-banner">
    <span class="pwa-icon">⚡</span>
    <span>Install aplikasi ini untuk digunakan secara offline!</span>
    <button id="pwa-install-btn">Install Sekarang</button>
    <button class="pwa-close" id="pwa-close-btn">✕</button>
</div>

<!-- 3 Kolom Utama -->
<div id="container"></div>

<script src="bldc-helper.js"></script>
<script src="scriptnew.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   INISIALISASI ELEMEN UI
══════════════════════════════════════════════════════ */
const cnt     = getContainer("container");
const inTxa   = createTextarea("text-input");
inTxa.value   = "V = 24\nI = 5\nN = 200\nL = 0.1\nf = 1\np = 1\nfasa = 3";

const btnDiv    = createDiv("button-container");
const btnHitung = createButton("btn-hitung", "COMPUTE");
const btnJalan  = createButton("btn-jalan",  "▶ RUN");
const btnStop   = createButton("btn-stop",   "■ STOP");
const btnGaya   = createButton("btn-gaya",   "⚡ GAYA (F)");

const outTxa         = createTextarea("text-output");
outTxa.readOnly      = true;
outTxa.placeholder   = "Tekan COMPUTE untuk melihat hasil...";

const inputTitle     = document.createElement("h3");
inputTitle.textContent = "INPUT";
const outputTitle    = document.createElement("h3");
outputTitle.textContent = "OUTPUT";

const inputBox  = createDiv("input-box");
inputBox.append(inputTitle, inTxa);
const outputBox = createDiv("output-box");
outputBox.append(outputTitle, outTxa);

const sbadge       = createDiv("sbadge");
sbadge.className   = "sbadge s2";
sbadge.textContent = "Stabil";

/* ── Canvas animasi auto ── */
const animDiv   = createDiv("animasi-container");
const animTitle = createHeading2("ANIMASI AUTO");

const ketC1           = document.createElement("div");
ketC1.className       = "ket";
ketC1.textContent     = "Canvas 1 — Solenoida & Medan B";
const cvs1 = createCanvas("c1", 340, 140);

const ketC2           = document.createElement("div");
ketC2.className       = "ket";
ketC2.textContent     = "Canvas 2 — Rotor digerakkan komutasi otomatis";
const cvs2 = createCanvas("c2", 340, 320);

/* ── Canvas manual switch ── */
const manualDiv   = createDiv("manual-container");
const manualTitle = createHeading2("MANUAL SWITCH (C3)");
const manualKet   = document.createElement("div");
manualKet.className   = "ket";
manualKet.textContent = "Canvas 3 — Manual: 6 Switch fisik seperti motor asli";

const swPanel  = createDiv("sw-panel");
const swLabels = [
    { lbl:'A', pol:'+', warna:'#c62828' },
    { lbl:'B', pol:'+', warna:'#c62828' },
    { lbl:'C', pol:'+', warna:'#c62828' },
    { lbl:'C', pol:'−', warna:'#1e88e5' },
    { lbl:'B', pol:'−', warna:'#1e88e5' },
    { lbl:'A', pol:'−', warna:'#1e88e5' },
];
for (let i = 1; i <= 6; i++) {
    const swBox       = createDiv("swb"+i);
    swBox.className   = "sw-box off-sw";
    const swNum       = document.createElement("div");
    swNum.className   = "sw-num";
    swNum.textContent = i;
    const swLbl       = document.createElement("div");
    swLbl.className   = "sw-label";
    swLbl.innerHTML   = swLabels[i-1].lbl
                      + ' <span style="color:'+swLabels[i-1].warna+'">'
                      + swLabels[i-1].pol+'</span>';
    const swBtn       = createButton("sw"+i, "OFF");
    swBtn.className   = "sw-btn";
    swBtn.addEventListener("click", () => toggleSw(i));
    swBox.append(swNum, swLbl, swBtn);
    swPanel.append(swBox);
}

const presetLabel         = document.createElement("div");
presetLabel.className     = "preset-label";
presetLabel.textContent   = "Preset Langkah Komutasi:";
const presetPanel         = createDiv("preset-panel");
presetPanel.className     = "step-btn";
['A⁺B⁻','A⁺C⁻','B⁺C⁻','B⁺A⁻','C⁺A⁻','C⁺B⁻'].forEach((txt, i) => {
    const btn = createButton("preset"+(i+1), txt);
    btn.addEventListener("click", () => setPreset(i));
    presetPanel.append(btn);
});

const rotorLabel          = document.createElement("div");
rotorLabel.className      = "preset-label";
rotorLabel.textContent    = "Gerak rotor manual:";
const rotorPanel          = createDiv("rotor-panel");
rotorPanel.className      = "step-btn";
const btnMinus            = createButton("btnMinus", "◀ −60°");
const btnPlus             = createButton("btnPlus",  "+60° ▶");
btnMinus.style.cssText    = "border-color:#1e88e5;color:#1e88e5";
btnPlus.style.cssText     = "border-color:#388e3c;color:#388e3c";
rotorPanel.append(btnMinus, btnPlus);

const rotorInfo           = createDiv("rotorInfo3");
rotorInfo.className       = "rotor-info";
rotorInfo.textContent     = "Sudut: 0° | Fasa: — | A=OFF B=OFF C=OFF";

const cvs3 = createCanvas("c3", 340, 320);

/* ── Susun DOM ── */
const panelAtas = createDiv("panel-atas");
panelAtas.append(inputBox, btnDiv, outputBox);
btnDiv.append(btnHitung, btnJalan, btnStop, btnGaya, sbadge);

cnt.append(panelAtas);
cnt.append(animDiv);
animDiv.append(animTitle, ketC1, cvs1, ketC2, cvs2);
cnt.append(manualDiv);
manualDiv.append(manualTitle, manualKet, swPanel,
    presetLabel, presetPanel,
    rotorLabel, rotorPanel,
    rotorInfo, cvs3);

changeElementsFlex(
    ["text-input",        "1"],
    ["button-container",  "1"],
    ["text-output",       "1.5"],
    ["animasi-container", "4"],
    ["manual-container",  "4"]
);

consolex.setOutput(outTxa);
consolex.setEOL("\n");

/* ── Event listeners tombol utama ── */
btnHitung.addEventListener("click", () => { hitung(); });
btnStop.addEventListener("click",   () => { hentikan(); });
btnGaya.addEventListener("click",   () => tekanGaya());
btnMinus.addEventListener("click",  () => rotorStep(-1));
btnPlus.addEventListener("click",   () => rotorStep(1));

btnJalan.addEventListener("click", () => {
    jalankan();
});

/* ══════════════════════════════════════════════════════
   PATCH drawC2
══════════════════════════════════════════════════════ */
(function patchDrawC2() {
    const _orig = drawC2;
    window.drawC2 = function() {
        _orig.apply(this, arguments);
    };
})();

/* ══════════════════════════════════════════════════════
   PWA — Service Worker & Install Banner
══════════════════════════════════════════════════════ */
let _deferredPrompt = null;

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
        .then(r  => console.log('[PWA] SW registered, scope:', r.scope))
        .catch(e => console.warn('[PWA] SW failed:', e));
}

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    const banner = document.getElementById('pwa-banner');
    if (banner) banner.style.display = 'flex';
});

document.getElementById('pwa-install-btn').addEventListener('click', async () => {
    if (!_deferredPrompt) return;
    _deferredPrompt.prompt();
    const { outcome } = await _deferredPrompt.userChoice;
    _deferredPrompt = null;
    document.getElementById('pwa-banner').style.display = 'none';
    console.log('[PWA] Install outcome:', outcome);
});

document.getElementById('pwa-close-btn').addEventListener('click', () => {
    document.getElementById('pwa-banner').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
    document.getElementById('pwa-banner').style.display = 'none';
    console.log('[PWA] App installed!');
});

/* ══════════════════════════════════════════════════════
   CHRONO / INISIALISASI
══════════════════════════════════════════════════════ */
hitung();
</script>

</body>
</html>
