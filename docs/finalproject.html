<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulasi Motor BLDC dengan Komutasi Multi-Fasa">
    <meta name="theme-color" content="#1565c0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BLDC Motor">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifestfinalproject.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-180final.png">
    
    <title>Simulasi BLDC Motor — Akhmad Rosyidan</title>
    <link rel="stylesheet" href="stylefinalproject.css">
</head>

<body>
    <h1 style="text-align:center; font-size:18px;">
        Simulasi BLDC Motor — Komutasi Multi-Fasa
    </h1>

    <!-- Container utama dengan 3 kolom besar -->
    <div id="container" class="main-container">
        
        <!-- KOLOM 1: 1 Container (2 ROWS: ROW 1 = INPUT|BUTTON|OUTPUT horizontal, ROW 2 = CANVAS 1) -->
        <div id="col-1-main-container" class="main-col">
            <!-- ROW 1: INPUT | BUTTON | OUTPUT (Horizontal) -->
            <div class="row-1-horizontal">
                <div id="input-section"></div>
                <div id="button-section"></div>
                <div id="output-section"></div>
            </div>
            <!-- ROW 2: CANVAS 1 (Penuh lebar) -->
            <div id="canvas-1-section"></div>
        </div>

        <!-- KOLOM 2: 1 Container (CANVAS 2 + GRAFIK TEGANGAN) -->
        <div id="col-2-main-container" class="main-col">
            <div id="canvas-2-section"></div>
            <div id="grafik-tegangan-section"></div>
        </div>

        <!-- KOLOM 3: 1 Container (GRAFIK THETA + DATA LOGGER) -->
        <div id="col-3-main-container" class="main-col">
            <div id="grafik-theta-section"></div>
            <div id="data-logger-section"></div>
        </div>

    </div>

    <!-- Status PWA -->
    <div id="install-prompt" style="display: none; position: fixed; bottom: 20px; right: 20px; background: #1565c0; color: white; padding: 15px; border-radius: 8px; z-index: 1000; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
        <p style="margin: 0 0 10px 0; font-size: 14px;">Install aplikasi ke perangkat?</p>
        <div style="display: flex; gap: 10px;">
            <button id="install-btn" style="flex: 1; padding: 8px 12px; background: #fff; color: #1565c0; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Install</button>
            <button id="cancel-install" style="flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.3); color: white; border: none; border-radius: 4px; cursor: pointer;">Nanti</button>
        </div>
    </div>

    <script src="bldc-helperfinalproject.js"></script>
    <script src="script_finalproject.js"></script>

    <script>
        // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // PWA INSTALL PROMPT
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'block';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });

        document.getElementById('cancel-install').addEventListener('click', () => {
            document.getElementById('install-prompt').style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            console.log('BLDC Motor app was installed.');
        });

        // INPUT BOX (KOLOM 1)
        const inputBox = document.createElement("div");
        inputBox.className = "panel-box";
        inputBox.id = "input-box";

        const inputTitle = document.createElement("h3");
        inputTitle.textContent = "INPUT";
        inputBox.appendChild(inputTitle);

        const inTxa = createTextarea("text-input");
        inTxa.value =
            "V = 24\n" +
            "I = 5\n" +
            "N = 200\n" +
            "L = 0.1\n" +
            "f = 0.2\n" +
            "p = 1\n" +
            "fasa = 3";
        inputBox.appendChild(inTxa);
        
        document.getElementById("input-section").appendChild(inputBox);

        // BUTTON + BADGE (KOLOM 1)
        const buttonBox = document.createElement("div");
        buttonBox.className = "panel-box";
        buttonBox.id = "button-badge-box";

        const btnHitung = createButton("btn-hitung", "COMPUTE");
        const btnJalan = createButton("btn-jalan", "▶ RUN");
        const btnStop = createButton("btn-stop", "■ STOP");
        const btnGaya = createButton("btn-gaya", "⚡ GAYA (F)");
        btnGaya.title = "Gaya Eksternal: memberi simpangan rotor";

        const buttonContainer = document.createElement("div");
        buttonContainer.id = "button-container";
        buttonContainer.append(btnHitung, btnJalan, btnStop, btnGaya);
        buttonBox.appendChild(buttonContainer);

        const sbadge = document.createElement("div");
        sbadge.id = "sbadge";
        sbadge.className = "sbadge s2";
        sbadge.textContent = "Stabil";
        buttonBox.appendChild(sbadge);
        
        document.getElementById("button-section").appendChild(buttonBox);

        // OUTPUT BOX (KOLOM 1)
        const outputBox = document.createElement("div");
        outputBox.className = "panel-box";
        outputBox.id = "output-box";

        const outputTitle = document.createElement("h3");
        outputTitle.textContent = "OUTPUT";
        outputBox.appendChild(outputTitle);

        const outTxa = createTextarea("text-output");
        outTxa.readOnly = true;
        outTxa.placeholder = "Tekan HITUNG untuk melihat hasil...";
        outputBox.appendChild(outTxa);
        
        document.getElementById("output-section").appendChild(outputBox);

        // CANVAS 1 (KOLOM 1) — TUNGGAL SAJA
        const canvas1Box = document.createElement("div");
        canvas1Box.className = "panel-box";
        canvas1Box.id = "canvas-1-box";

        const animTitle = createHeading2("SOLENOIDA & MEDAN B");
        const ketC1 = document.createElement("div");
        ketC1.className = "ket";
        ketC1.textContent = "Visualisasi solenoida dengan medan magnet";

        canvas1Box.appendChild(animTitle);
        canvas1Box.appendChild(ketC1);
        canvas1Box.appendChild(createCanvas("c1", 340, 140));

        document.getElementById("canvas-1-section").appendChild(canvas1Box);

        // CANVAS 2 (KOLOM 2)
        const canvas2Box = document.createElement("div");
        canvas2Box.className = "panel-box";
        canvas2Box.id = "canvas-2-box";

        const canvas2Title = createHeading2("ANIMASI ROTOR");
        const ketC2 = document.createElement("div");
        ketC2.className = "ket";
        ketC2.textContent = "Rotor digerakkan dengan komutasi 6-Step";

        canvas2Box.appendChild(canvas2Title);
        canvas2Box.appendChild(ketC2);
        canvas2Box.appendChild(createCanvas("c2", 340, 300));

        document.getElementById("canvas-2-section").appendChild(canvas2Box);

        // GRAFIK TEGANGAN (KOLOM 2)
        const grafTegBox = document.createElement("div");
        grafTegBox.className = "panel-box";
        grafTegBox.id = "grafik-tegangan-box";

        const graphTitle = createHeading2("GRAFIK TEGANGAN TIAP FASA (6-STEP)");
        const ketGraph = document.createElement("div");
        ketGraph.className = "ket";
        ketGraph.textContent = "Tegangan Fasa A/B/C terhadap sudut rotor (Hijau-Orange-Ungu)";

        grafTegBox.appendChild(graphTitle);
        grafTegBox.appendChild(ketGraph);
        grafTegBox.appendChild(createCanvas("graph", 340, 240));

        document.getElementById("grafik-tegangan-section").appendChild(grafTegBox);

        // GRAFIK THETA (KOLOM 3)
        const grafThetaBox = document.createElement("div");
        grafThetaBox.className = "panel-box";
        grafThetaBox.id = "grafik-theta-box";

        const graphThetaTitle = createHeading2("GRAFIK SUDUT ROTOR (θ) vs WAKTU");
        const ketGraphTheta = document.createElement("div");
        ketGraphTheta.className = "ket";
        ketGraphTheta.textContent = "Sudut rotor (derajat) terhadap waktu (detik) - KUNING";

        grafThetaBox.appendChild(graphThetaTitle);
        grafThetaBox.appendChild(ketGraphTheta);
        grafThetaBox.appendChild(createCanvas("graph-theta", 340, 240));

        document.getElementById("grafik-theta-section").appendChild(grafThetaBox);


        // DATA LOGGER (KOLOM 3)
        const dataLogBox = document.createElement("div");
        dataLogBox.className = "panel-box";
        dataLogBox.id = "data-logger-box";

        const dataLoggerTitle = createHeading2("DATA LOGGER THETA vs WAKTU");
        const ketDataLogger = document.createElement("div");
        ketDataLogger.className = "ket";
        ketDataLogger.textContent = "Pembacaan posisi rotor setiap interval waktu";
        const txyDataLogger = createTextarea("data-logger");
        txyDataLogger.readOnly = true;
        txyDataLogger.placeholder = "Data akan ditampilkan saat RUN atau GAYA aktif...";

        dataLogBox.appendChild(dataLoggerTitle);
        dataLogBox.appendChild(ketDataLogger);
        dataLogBox.appendChild(txyDataLogger);

        document.getElementById("data-logger-section").appendChild(dataLogBox);

        // BIND OUTPUT CONSOLE
        consolex.setOutput(outTxa);
        consolex.setEOL("\n");

        // EVENT LISTENER TOMBOL
        btnHitung.addEventListener("click", () => hitung());
        btnJalan.addEventListener("click", () => jalankan());
        btnStop.addEventListener("click", () => hentikan());

        btnGaya.addEventListener("click", () => {
            tekanGaya();
            if (F.aktif) {
                btnGaya.classList.add('aktif');
                btnGaya.textContent = '⚡ GAYA AKTIF';
            } else {
                btnGaya.classList.remove('aktif');
                btnGaya.textContent = '⚡ GAYA (F)';
            }
        });

        const _origHentikanGaya = hentikanGaya;
        window.hentikanGaya = function () {
            _origHentikanGaya();
            btnGaya.classList.remove('aktif');
            btnGaya.textContent = '⚡ GAYA (F)';
        };

        // INISIALISASI AWAL
        hitung();
    </script>

</body>

</html>
